version: "3.9"

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - backend

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: realtime
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coredb
      POSTGRES_USER: coreuser
      POSTGRES_PASSWORD: corepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./Backend/CoreService
      dockerfile: Dockerfile
    container_name: core-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coredb
      SPRING_DATASOURCE_USERNAME: coreuser
      SPRING_DATASOURCE_PASSWORD: corepass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    networks:
      - backend

  realtime-service:
    build:
      context: ./Backend/RealTimeService
      dockerfile: Dockerfile
    container_name: realtime-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URL: mongodb://mongodb:27017/realtime
      KAFKA_BROKER: kafka:9092
      CORESERVICE_URL: http://core-service:8080
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
      - kafka
      - core-service
    networks:
      - backend

volumes:
  kafka_data:
  mongo_data:
  postgres_data:

networks:
  backend:
    driver: bridge
